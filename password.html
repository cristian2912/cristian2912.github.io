<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Contraseñas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Validador de Contraseñas con Autómata Finito</h1>
        <div class="password-container">
            <input type="password" id="passwordInput" placeholder="Ingresa tu contraseña">
            <button id="validateBtn">Validar</button>
        </div>
        <div id="result"></div>
        <div class="rules">
            <h3>Reglas de la contraseña:</h3>
            <ul>
                <li id="lengthRule">Al menos 8 caracteres</li>
                <li id="upperRule">Al menos una letra mayúscula</li>
                <li id="numberRule">Al menos un número</li>
                <li id="specialRule">Al menos un carácter especial (!@#$%^&*)</li>
            </ul>
        </div>
        <a href="index.html" class="back-link">Volver a la página principal</a>
    </div>
    <script src="password.js"></script>
</body>
</html>
