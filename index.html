<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificación de Rutas para Drones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1, h2 {
            color: #333;
        }
        section {
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input {
            margin-bottom: 10px;
            padding: 5px;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Planificación de Rutas para Drones</h1>

    <!-- Sección para el Dron -->
    <section>
        <h2>Calcular Ruta Óptima</h2>
        <label for="startNode">Nodo de inicio:</label>
        <select id="startNode">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
        </select>
        <label for="endNode">Nodo de destino:</label>
        <select id="endNode">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
        </select>
        <button id="calcularRuta">Calcular Ruta</button>
    </section>

    <!-- Resultados -->
    <section id="resultados">
        <h2>Resultados</h2>
        <p id="rutaOptima"></p>
        <p id="consumoBateria"></p>
    </section>

    <!-- Scripts -->
    <script src="dron.js"></script>
    <script src="app.js"></script>
</body>
</html>
