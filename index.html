<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificación de Rutas para Drones</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Planificación de Rutas para Drones</h1>
    <div id="map"></div> <!-- Mapa interactivo -->
    <div id="controls">
        <label for="startNode">Nodo de inicio:</label>
        <select id="startNode">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
        </select>
        <label for="endNode">Nodo de destino:</label>
        <select id="endNode">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
            <option value="D">D</option>
            <option value="E">E</option>
            <option value="F">F</option>
        </select>
        <button id="calcularRuta">Calcular Ruta</button>
    </div>
    <div id="resultados">
        <h2>Resultados</h2>
        <p id="rutaOptima"></p>
        <p id="consumoBateria"></p>
        <p id="condicionesClimaticas"></p>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="dron.js"></script>
    <script src="app.js"></script>
</body>
</html>
