<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificación de Rutas para Drones</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Planificación de Rutas para Drones</h1>

    <!-- Sección para el Dron -->
    <section>
        <h2>Calcular Ruta Óptima</h2>
        <form id="dronForm">
            <label for="startDron">Nodo de inicio:</label>
            <input type="text" id="startDron" name="startDron" required>
            <label for="endDron">Nodo de destino:</label>
            <input type="text" id="endDron" name="endDron" required>
            <button type="submit">Calcular Ruta</button>
        </form>
        <div id="resultDron">
            <h3>Resultados</h3>
            <p id="rutaOptima"></p>
            <p id="consumoBateria"></p>
            <canvas id="rutaChart"></canvas> <!-- Gráfica de la ruta -->
            <div id="desgloseConsumo"></div> <!-- Desglose del consumo -->
        </div>
    </section>

    <!-- Scripts -->
    <script src="dron.js"></script>
</body>
</html>
